<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💡 提示詞大神 Prompt Master</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        /* 讓標題區塊變成橫向排列，方便放置齒輪 */
        .header-container {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-bottom: 20px;
        }
        h1 {
            color: #2c3e50;
            margin: 0;
        }
        /* 齒輪按鈕的樣式 */
        .settings-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            position: absolute;
            right: 0;
            transition: transform 0.3s;
        }
        .settings-btn:hover {
            transform: rotate(90deg); /* 滑鼠游標移過去時會有旋轉動畫 */
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            resize: vertical;
            box-sizing: border-box;
            margin-bottom: 20px;
        }
        textarea:focus {
            border-color: #3498db;
            outline: none;
        }
        button.action-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s;
        }
        button.action-btn:hover {
            background-color: #2980b9;
        }
        button.action-btn:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }
        .result-box {
            margin-top: 30px;
            background-color: #ecf0f1;
            padding: 20px;
            border-radius: 8px;
            white-space: pre-wrap; 
            font-size: 16px;
            line-height: 1.6;
            display: none; 
        }
        .loader {
            text-align: center;
            margin-top: 15px;
            color: #7f8c8d;
            font-style: italic;
            display: none;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>💡 提示詞大神</h1>
        <!-- 齒輪按鈕，點擊呼叫設定金鑰的函數 -->
        <button class="settings-btn" onclick="configureApiKey()" title="設定/清除 API Key">⚙️</button>
    </div>
    
    <div class="container">
        <p>請輸入你腦中粗略的想法或簡單的指令：</p>
        <textarea id="userInput" placeholder="例如：幫我寫一個關於 AI 融入教學的研習計畫，大概 2 小時..."></textarea>
        
        <button id="optimizeBtn" class="action-btn" onclick="optimizePrompt()">✨ 一鍵優化提示詞</button>
        <div id="loader" class="loader">大神正在施展魔法中，請稍候...</div>
        
        <div id="resultBox" class="result-box"></div>
    </div>

    <script>
        // 設定與管理 API Key 的函數
        function configureApiKey() {
            // 從瀏覽器本機儲存空間取得舊的金鑰（如果有的話）
            let savedKey = localStorage.getItem('gemini_api_key') || "";
            
            // 跳出對話框讓使用者輸入
            let newKey = prompt("🔑 請貼上您的 Gemini API Key：\n\n（💡 若要清除本機的儲存紀錄，請直接清空輸入框並按下確定）", savedKey);
            
            // 如果使用者按下「確定」（而不是「取消」）
            if (newKey !== null) {
                if (newKey.trim() === "") {
                    // 如果輸入空白，就從本機空間移除該紀錄
                    localStorage.removeItem('gemini_api_key');
                    alert("🗑️ API Key 已從您的瀏覽器中清除！");
                } else {
                    // 如果有輸入內容，就儲存到本機空間
                    localStorage.setItem('gemini_api_key', newKey.trim());
                    alert("✅ API Key 已成功儲存！下次開啟網頁無需重新輸入。");
                }
            }
        }

        async function optimizePrompt() {
            // 每次執行時，先從本機儲存空間把金鑰抓出來
            const apiKey = localStorage.getItem('gemini_api_key');
            const userInput = document.getElementById('userInput').value.trim();
            
            const btn = document.getElementById('optimizeBtn');
            const loader = document.getElementById('loader');
            const resultBox = document.getElementById('resultBox');

            // 檢查是否已經設定金鑰
            if (!apiKey) {
                alert("⚠️ 請先點擊右上角的「⚙️ 齒輪」設定您的 API Key！");
                return;
            }
            if (!userInput) {
                alert("請先輸入一些想法喔！");
                document.getElementById('userInput').focus();
                return;
            }

            btn.disabled = true;
            loader.style.display = 'block';
            resultBox.style.display = 'none';
            resultBox.innerHTML = '';

            const systemPrompt = `你現在是一位頂級的「AI 提示詞工程師」。
請將使用者輸入的粗略想法，運用 RTCF (角色 Role、任務 Task、情境 Context、格式 Format) 等框架，擴寫並優化成一個結構清晰、可以直接複製貼上給 AI 執行的完美 Prompt。
請直接輸出優化後的 Prompt 內容，不要包含任何開場白或自我介紹，並且適當使用 Markdown 語法（如粗體、清單）讓結構更易讀。`;

            const fullPrompt = `${systemPrompt}\n\n使用者的粗略想法：${userInput}\n\n請給出優化後的完美版本：`;

            // 使用去除了 -latest 的標準模型名稱
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: fullPrompt }]
                        }],
                        generationConfig: {
                            temperature: 0.7 
                        }
                    })
                });

                const data = await response.json();

                if (data.candidates && data.candidates.length > 0) {
                    resultBox.innerHTML = data.candidates[0].content.parts[0].text;
                } else if (data.error) {
                    resultBox.innerHTML = "🚨 API 發生錯誤：" + data.error.message;
                    // 若發生錯誤（例如金鑰無效），提示使用者檢查設定
                    alert("API 呼叫失敗，請點擊右上角齒輪確認金鑰是否正確！");
                } else {
                    resultBox.innerHTML = "發生未知錯誤，請檢查連線。";
                }
                
                resultBox.style.display = 'block';

            } catch (error) {
                console.error("呼叫失敗:", error);
                resultBox.innerHTML = "連線失敗，請檢查網路狀態。";
                resultBox.style.display = 'block';
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
